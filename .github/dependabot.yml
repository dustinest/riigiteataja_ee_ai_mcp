# Dependabot version updates. Docs:
# https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  # npm dependencies (package.json / package-lock.json at the repo root)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    # Roll routine minor/patch bumps into one PR to cut review noise; let
    # majors come through on their own so breaking changes get a dedicated PR.
    groups:
      npm-minor-patch:
        update-types:
          - "minor"
          - "patch"

  # GitHub Actions used in .github/workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"

  # Base image in the Dockerfile (node:22-slim)
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
